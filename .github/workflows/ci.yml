name: Pipeline de Integración Continua SQA

on:
  push:
    branches: [ "main", "master", "development", "sprint-2" ]
  pull_request:
    branches: [ "main", "master", "development", "sprint-2" ]

# IMPORTANTE: Se requieren estos permisos para que el pipeline pueda
# dibujar la interfaz de los reportes en la ventana de tus commits/PRs
# IMPORTANTE: Configuración de seguridad corregida
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pruebas-backend:
    name: Pruebas Unitarias - Backend (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código fuente
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Pruebas Unitarias (Maven)
        working-directory: ./backend
        run: mvn clean test

      # Este componente lee el XML de Maven y crea la interfaz visual
      - name: Publicar Reporte de Pruebas
        uses: dorny/test-reporter@v1
        if: success() || failure()    # Obliga a generar el reporte aunque el paso anterior haya fallado
        with:
          name: Resultados de Pruebas JUnit
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit