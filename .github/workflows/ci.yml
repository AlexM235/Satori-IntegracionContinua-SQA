name: Pipeline de Integración Continua SQA

# 1. ¿Cuándo se ejecuta? Cada vez que suben código a la rama principal o hacen un PR
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # TRABAJO 1: Pruebas del Backend (Spring Boot)
  # ==========================================
  pruebas-backend:
    name: Unit Tests - Backend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Guarda las dependencias para que las futuras ejecuciones sean rapidísimas

      - name: Ejecutar Pruebas Unitarias (Maven)
        working-directory: ./backend  # Le indica que entre a la carpeta del backend
        run: mvn clean test

  # ==========================================
  # TRABAJO 2: Pruebas del Frontend (Angular)
  # ==========================================
  pruebas-frontend:
    name: Unit Tests - Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Instalar Dependencias
        working-directory: ./frontend
        run: npm install

      - name: Ejecutar Pruebas (Karma/Jasmine en modo CI)
        working-directory: ./frontend
        # Se ejecuta Chrome de forma "invisible" (Headless) porque el servidor de GitHub no tiene pantalla
        run: npm run test -- --watch=false --browsers=ChromeHeadless