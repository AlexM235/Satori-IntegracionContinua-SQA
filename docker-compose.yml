services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Dserver.servlet.context-path=/
    networks:
      - app-network
    container_name: satori-backend

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network
    container_name: satori-frontend
    environment:
      - API_BASE_URL=http://backend:8080

networks:
  app-network:
    driver: bridge